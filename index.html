<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shape Merge Drop</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root {
    width: 100%;
    height: 100%;
    overflow: hidden;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    background: #e0e5ec;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef, useCallback } = React;

  const TIERS = [
    { radius: 18, color: '#FF6B9D', icon: '1' },
    { radius: 26, color: '#F8B500', icon: '2' },
    { radius: 34, color: '#4ECDC4', icon: '3' },
    { radius: 44, color: '#556270', icon: '4' },
    { radius: 56, color: '#C44569', icon: '5' },
    { radius: 72, color: '#A29BFE', icon: '★' },
  ];

  function MergeDropGame() {
    const containerRef = useRef(null);
    const canvasRef = useRef(null);
    const engineRef = useRef(null);
    const wallsRef = useRef([]);
    const rafRef = useRef(null);
    const lastDropRef = useRef(0);
    const nextTierRef = useRef(1);
    const scoreRef = useRef(0);
    const gameOverRef = useRef(false);
    const dangerMapRef = useRef(new Map());
    const particlesRef = useRef([]);
    const mouseXRef = useRef(0);
    const dimsRef = useRef({ width: 0, height: 0 });
    const mergeQueueRef = useRef([]);
    const resizeObsRef = useRef(null);

    const [score, setScore] = useState(0);
    const [nextTier, setNextTier] = useState(1);
    const [gameOver, setGameOver] = useState(false);

    const getNextTier = useCallback(() => {
      const r = Math.random();
      if (r > 0.85) return 3;
      if (r > 0.55) return 2;
      return 1;
    }, []);

    const createBody = useCallback((x, y, tier) => {
      const cfg = TIERS[tier - 1];
      const body = Matter.Bodies.circle(x, y, cfg.radius, {
        label: `tier-${tier}`,
        restitution: 0.35,
        friction: 0.6,
        frictionAir: 0.012,
        density: 0.001,
        render: { fillStyle: cfg.color }
      });
      body.createdAt = Date.now();
      body.tierIcon = cfg.icon;
      return body;
    }, []);

    const spawnParticles = useCallback((x, y, color) => {
      for (let i = 0; i < 14; i++) {
        particlesRef.current.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 10,
          vy: (Math.random() - 0.5) * 10 - 2,
          life: 1.0,
          color,
          size: Math.random() * 5 + 2
        });
      }
    }, []);

    const updateParticles = useCallback(() => {
      const arr = particlesRef.current;
      for (let i = arr.length - 1; i >= 0; i--) {
        const p = arr[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.25;
        p.life -= 0.025;
        if (p.life <= 0) arr.splice(i, 1);
      }
    }, []);

    const capVelocities = useCallback(() => {
      if (!engineRef.current) return;
      const bodies = Matter.Composite.allBodies(engineRef.current.world);
      for (const body of bodies) {
        if (body.isStatic) continue;
        const speed = Math.hypot(body.velocity.x, body.velocity.y);
        if (speed > 16) {
          const s = 16 / speed;
          Matter.Body.setVelocity(body, { x: body.velocity.x * s, y: body.velocity.y * s });
        }
        if (Math.abs(body.angularVelocity) > 0.12) {
          Matter.Body.setAngularVelocity(body, 0.12 * Math.sign(body.angularVelocity));
        }
      }
    }, []);

    const processMerges = useCallback(() => {
      if (!engineRef.current || mergeQueueRef.current.length === 0) return;
      const world = engineRef.current.world;
      const merge = mergeQueueRef.current.shift();
      const { bodyA, bodyB, tier } = merge;

      const aExists = Matter.Composite.get(world, bodyA.id, 'body') === bodyA;
      const bExists = Matter.Composite.get(world, bodyB.id, 'body') === bodyB;
      if (!aExists || !bExists) return;

      const midX = (bodyA.position.x + bodyB.position.x) / 2;
      const midY = (bodyA.position.y + bodyB.position.y) / 2;

      Matter.World.remove(world, [bodyA, bodyB]);
      dangerMapRef.current.delete(bodyA.id);
      dangerMapRef.current.delete(bodyB.id);

      if (tier < 6) {
        const newBody = createBody(midX, midY, tier + 1);
        Matter.World.add(world, newBody);
        scoreRef.current += tier * 10;
        if (tier + 1 === 6) scoreRef.current += 50;
        setScore(scoreRef.current);
        spawnParticles(midX, midY, TIERS[tier].color);
      } else {
        // Max tier merge -> bonus and remove
        scoreRef.current += 100;
        setScore(scoreRef.current);
        spawnParticles(midX, midY, '#FFD700');
      }
    }, [createBody, spawnParticles]);

    const checkDanger = useCallback(() => {
      if (!engineRef.current || gameOverRef.current) return;
      const { height } = dimsRef.current;
      const dangerY = height * 0.26;
      const now = Date.now();
      const bodies = Matter.Composite.allBodies(engineRef.current.world)
        .filter(b => !b.isStatic && b.label && b.label.startsWith('tier-'));

      for (const [id] of dangerMapRef.current) {
        if (!bodies.find(b => b.id === id)) dangerMapRef.current.delete(id);
      }

      for (const body of bodies) {
        if (now - body.createdAt < 1800) continue;
        if (body.position.y < dangerY) {
          if (!dangerMapRef.current.has(body.id)) {
            dangerMapRef.current.set(body.id, now);
          } else {
            const start = dangerMapRef.current.get(body.id);
            if (now - start > 6000) {
              gameOverRef.current = true;
              setGameOver(true);
              return;
            }
          }
        } else {
          dangerMapRef.current.delete(body.id);
        }
      }
    }, []);

    const draw = useCallback(() => {
      const canvas = canvasRef.current;
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const { width, height } = dimsRef.current;
      const dpr = window.devicePixelRatio || 1;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Danger line
      const dangerY = height * 0.26;
      ctx.save();
      ctx.strokeStyle = 'rgba(255, 100, 100, 0.3)';
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 8]);
      ctx.beginPath();
      ctx.moveTo(0, dangerY);
      ctx.lineTo(width, dangerY);
      ctx.stroke();
      ctx.restore();

      // Cooldown bar
      const since = Date.now() - lastDropRef.current;
      if (since < 500) {
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.fillRect(0, 0, width * (since / 500), 3);
      }

      // Preview ghost
      if (!gameOverRef.current) {
        const cfg = TIERS[nextTierRef.current - 1];
        const px = mouseXRef.current;
        const py = cfg.radius + 24;
        ctx.save();
        ctx.globalAlpha = 0.45;
        ctx.fillStyle = cfg.color;
        ctx.shadowColor = 'rgba(0,0,0,0.1)';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(px, py, cfg.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // Bodies
      if (engineRef.current) {
        const bodies = Matter.Composite.allBodies(engineRef.current.world);
        for (const body of bodies) {
          if (body.isStatic || !body.circleRadius) continue;
          ctx.save();
          ctx.translate(body.position.x, body.position.y);
          ctx.rotate(body.angle);

          // Soft neumorphic shadow
          ctx.shadowColor = 'rgba(163, 177, 198, 0.55)';
          ctx.shadowBlur = 14;
          ctx.shadowOffsetX = 5;
          ctx.shadowOffsetY = 5;

          ctx.fillStyle = body.render.fillStyle;
          ctx.beginPath();
          ctx.arc(0, 0, body.circleRadius, 0, Math.PI * 2);
          ctx.fill();

          // Inner highlight
          ctx.shadowColor = 'transparent';
          ctx.fillStyle = 'rgba(255,255,255,0.32)';
          ctx.beginPath();
          ctx.arc(-body.circleRadius * 0.25, -body.circleRadius * 0.25, body.circleRadius * 0.55, 0, Math.PI * 2);
          ctx.fill();

          // Icon
          ctx.fillStyle = 'rgba(255,255,255,0.95)';
          ctx.font = `bold ${Math.floor(body.circleRadius * 0.9)}px sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(body.tierIcon || '', 0, 1);

          ctx.restore();
        }
      }

      // Particles
      for (const p of particlesRef.current) {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }, []);

    const resize = useCallback(() => {
      const container = containerRef.current;
      const canvas = canvasRef.current;
      if (!container || !canvas) return;
      const rect = container.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const w = Math.floor(rect.width);
      const h = Math.floor(rect.height);

      if (Math.abs(canvas.width / dpr - w) > 2 || Math.abs(canvas.height / dpr - h) > 2) {
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        const ctx = canvas.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        dimsRef.current = { width: w, height: h };

        // Recreate walls
        if (engineRef.current) {
          const world = engineRef.current.world;
          if (wallsRef.current.length) {
            Matter.World.remove(world, wallsRef.current);
            wallsRef.current = [];
          }
          const t = 60;
          wallsRef.current = [
            Matter.Bodies.rectangle(-t / 2, h / 2, t, h * 2 + 200, { isStatic: true, label: 'wall', render: { visible: false } }),
            Matter.Bodies.rectangle(w + t / 2, h / 2, t, h * 2 + 200, { isStatic: true, label: 'wall', render: { visible: false } }),
            Matter.Bodies.rectangle(w / 2, h + t / 2, w * 2, t, { isStatic: true, label: 'wall', render: { visible: false } })
          ];
          Matter.World.add(world, wallsRef.current);
        }
      }
    }, []);

    const cleanup = useCallback(() => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      if (resizeObsRef.current) resizeObsRef.current.disconnect();
      if (engineRef.current) {
        Matter.Events.off(engineRef.current, 'collisionStart');
        Matter.World.clear(engineRef.current.world);
        Matter.Engine.clear(engineRef.current);
        engineRef.current = null;
      }
    }, []);

    const init = useCallback(() => {
      cleanup();
      const engine = Matter.Engine.create({
        gravity: { x: 0, y: 0.55 }
      });
      engine.positionIterations = 10;
      engine.velocityIterations = 8;
      engine.constraintIterations = 3;
      engineRef.current = engine;

      // Collision -> merge queue
      Matter.Events.on(engine, 'collisionStart', (event) => {
        for (const pair of event.pairs) {
          const { bodyA, bodyB } = pair;
          if (bodyA.label && bodyB.label && bodyA.label.startsWith('tier-') && bodyB.label.startsWith('tier-')) {
            const tA = parseInt(bodyA.label.split('-')[1], 10);
            const tB = parseInt(bodyB.label.split('-')[1], 10);
            if (tA === tB) {
              const key = [bodyA.id, bodyB.id].sort((a, b) => a - b).join('-');
              if (!mergeQueueRef.current.find(m => m.key === key)) {
                mergeQueueRef.current.push({ key, bodyA, bodyB, tier: tA });
              }
            }
          }
        }
      });

      resize();

      const loop = () => {
        if (engineRef.current) {
          Matter.Engine.update(engineRef.current, 1000 / 60);
          capVelocities();
          processMerges();
          checkDanger();
          updateParticles();
        }
        draw();
        rafRef.current = requestAnimationFrame(loop);
      };
      rafRef.current = requestAnimationFrame(loop);
    }, [cleanup, resize, capVelocities, processMerges, checkDanger, updateParticles, draw]);

    const restart = useCallback(() => {
      dangerMapRef.current.clear();
      particlesRef.current = [];
      mergeQueueRef.current = [];
      scoreRef.current = 0;
      setScore(0);
      nextTierRef.current = getNextTier();
      setNextTier(nextTierRef.current);
      gameOverRef.current = false;
      setGameOver(false);
      lastDropRef.current = 0;
      mouseXRef.current = dimsRef.current.width / 2;
      init();
    }, [init, getNextTier]);

    const handlePointerMove = useCallback((e) => {
      const rect = canvasRef.current.getBoundingClientRect();
      mouseXRef.current = e.clientX - rect.left;
    }, []);

    const handlePointerDown = useCallback((e) => {
      e.preventDefault();
      if (gameOverRef.current) return;
      const now = Date.now();
      if (now - lastDropRef.current < 500) return;

      const rect = canvasRef.current.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const cfg = TIERS[nextTierRef.current - 1];
      const maxX = dimsRef.current.width - cfg.radius - 8;
      const minX = cfg.radius + 8;
      const clamped = Math.max(minX, Math.min(maxX, x));

      const body = createBody(clamped, cfg.radius + 24, nextTierRef.current);
      Matter.World.add(engineRef.current.world, body);
      lastDropRef.current = now;

      const n = getNextTier();
      nextTierRef.current = n;
      setNextTier(n);
    }, [createBody, getNextTier]);

    useEffect(() => {
      nextTierRef.current = getNextTier();
      setNextTier(nextTierRef.current);
      init();

      resizeObsRef.current = new ResizeObserver(() => resize());
      if (containerRef.current) resizeObsRef.current.observe(containerRef.current);

      return () => cleanup();
    }, [init, resize, cleanup, getNextTier]);

    useEffect(() => {
      const handleOrientation = () => setTimeout(resize, 300);
      window.addEventListener('resize', resize);
      window.addEventListener('orientationchange', handleOrientation);
      return () => {
        window.removeEventListener('resize', resize);
        window.removeEventListener('orientationchange', handleOrientation);
      };
    }, [resize]);

    const pillStyle = {
      borderRadius: 9999,
      background: '#e0e5ec',
      boxShadow: '6px 6px 12px #a3b1c6, -6px -6px 12px #ffffff',
      display: 'flex',
      alignItems: 'center',
      gap: 10,
      padding: '10px 22px'
    };

    return (
      <div style={{ width: '100vw', height: '100vh', display: 'flex', flexDirection: 'column', background: '#e0e5ec' }}>
        {/* Header */}
        <div style={{ padding: '16px 18px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12, flexShrink: 0 }}>
          <div style={pillStyle}>
            <span style={{ color: '#7d8a9b', fontSize: 13, fontWeight: 700, letterSpacing: 0.5 }}>SCORE</span>
            <span style={{ color: '#4a5568', fontSize: 22, fontWeight: 800, minWidth: 50, textAlign: 'right' }}>{score}</span>
          </div>

          <div style={{ ...pillStyle, gap: 14 }}>
            <span style={{ color: '#7d8a9b', fontSize: 13, fontWeight: 700, letterSpacing: 0.5 }}>NEXT</span>
            <div style={{
              width: 34,
              height: 34,
              borderRadius: '50%',
              background: TIERS[nextTier - 1]?.color || '#ccc',
              boxShadow: 'inset 2px 2px 5px rgba(0,0,0,0.15), inset -2px -2px 5px rgba(255,255,255,0.4)',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              color: '#fff',
              fontWeight: 800,
              fontSize: 15
            }}>
              {TIERS[nextTier - 1]?.icon}
            </div>
          </div>
        </div>

        {/* Game Area */}
        <div ref={containerRef} style={{
          flex: 1,
          margin: '0 16px 16px',
          borderRadius: 32,
          background: '#e0e5ec',
          boxShadow: 'inset 8px 8px 16px #a3b1c6, inset -8px -8px 16px #ffffff',
          position: 'relative',
          overflow: 'hidden',
          touchAction: 'none'
        }}>
          <canvas
            ref={canvasRef}
            onPointerMove={handlePointerMove}
            onPointerDown={handlePointerDown}
            onContextMenu={(e) => e.preventDefault()}
            style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', touchAction: 'none', cursor: 'crosshair' }}
          />

          {gameOver && (
            <div style={{
              position: 'absolute',
              inset: 0,
              display: 'flex',
              flexDirection: 'column',
              alignItems: 'center',
              justifyContent: 'center',
              background: 'rgba(224, 229, 236, 0.82)',
              backdropFilter: 'blur(6px)',
              zIndex: 10,
              gap: 18,
              padding: 20
            }}>
              <div style={{
                borderRadius: 999,
                background: '#e0e5ec',
                boxShadow: '10px 10px 20px #a3b1c6, -10px -10px 20px #ffffff',
                padding: '32px 44px',
                textAlign: 'center',
                maxWidth: 360,
                width: '100%'
              }}>
                <h2 style={{ color: '#4a5568', marginBottom: 6, fontSize: 26, fontWeight: 800 }}>Nice Work!</h2>
                <p style={{ color: '#7d8a9b', fontSize: 15, marginBottom: 20, fontWeight: 600 }}>You scored {score} points</p>
                <button onPointerDown={(e) => { e.stopPropagation(); restart(); }} style={{
                  borderRadius: 999,
                  border: 'none',
                  background: '#e0e5ec',
                  boxShadow: '6px 6px 12px #a3b1c6, -6px -6px 12px #ffffff',
                  padding: '14px 36px',
                  color: '#4a5568',
                  fontSize: 16,
                  fontWeight: 800,
                  cursor: 'pointer',
                  outline: 'none',
                  WebkitTapHighlightColor: 'transparent'
                }}>
                  Play Again
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<MergeDropGame />);
</script>
</body>
</html>
